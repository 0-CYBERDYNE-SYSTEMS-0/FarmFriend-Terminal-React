<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- DDS Text -->
  <text x="10" y="40" font-family="Orbitron, monospace" font-size="32" font-weight="bold" fill="url(#logoGradient)" filter="url(#glow)">DDS</text>
  
  <!-- Circuit Pattern -->
  <g stroke="#667eea" stroke-width="2" fill="none" opacity="0.6">
    <path d="M70 15 L90 15 L90 25 L110 25" />
    <circle cx="70" cy="15" r="3" fill="#667eea"/>
    <circle cx="90" cy="25" r="3" fill="#667eea"/>
    <circle cx="110" cy="25" r="3" fill="#667eea"/>
    
    <path d="M70 45 L90 45 L90 35 L110 35" />
    <circle cx="70" cy="45" r="3" fill="#764ba2"/>
    <circle cx="90" cy="35" r="3" fill="#764ba2"/>
    <circle cx="110" cy="35" r="3" fill="#764ba2"/>
  </g>
  
  <!-- Enterprise Badge -->
  <rect x="120" y="20" width="70" height="20" rx="10" fill="url(#logoGradient)" opacity="0.2"/>
  <text x="155" y="33" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#667eea" text-anchor="middle">ENTERPRISE</text>
</svg>