id: code-quality
name: Code Quality Evaluation
description: Evaluates the quality of code generated by the agent
scoring: scale1-5
criteria:
  - dimension: correctness
    weight: 0.4
    description: Code compiles/runs without errors and meets requirements
  - dimension: efficiency
    weight: 0.2
    description: Code is optimized and follows best practices
  - dimension: safety
    weight: 0.2
    description: No security vulnerabilities or unsafe patterns
  - dimension: clarity
    weight: 0.2
    description: Code is well-structured, documented, and maintainable
